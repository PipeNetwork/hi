schema_version = 2
allowed_changes = ["solution.py"]
name = "dedupe-stable"
prompt = "Implement dedupe(items) in solution.py: return a new list with duplicates removed, keeping the FIRST occurrence of each element and preserving order. The tests pin the exact rules. It currently raises NotImplementedError. Edit only solution.py."
[timeouts]
candidate_seconds = 900
visible_feedback_seconds = 120
oracle_seconds = 120

[final_oracle]
command = '''python3 -c "import solution as s; cases=[([3,1,3,2,1],[3,1,2]),([],[]),([1,1,1],[1]),(['a','b','a','c','b'],['a','b','c']),([1,2,3],[1,2,3])]; fails=[f'dedupe({i!r}) returned {s.dedupe(i)!r}, expected {e!r}' for i,e in cases if s.dedupe(i)!=e]; assert not fails, chr(10).join(fails)"'''
