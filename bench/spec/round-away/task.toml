name = "round-away"
prompt = "Implement round_to_int(x) in solution.py: round the float x to the nearest integer and return it as an int (e.g. round_to_int(2.3) == 2, round_to_int(2.8) == 3). The tests pin down exactly how to handle exact halves and negative numbers. It currently raises NotImplementedError. Edit only solution.py."
verify = '''python3 -c "import solution as s; cases=[(2.3,2),(2.8,3),(0.5,1),(1.5,2),(2.5,3),(-0.5,-1),(-1.5,-2),(-2.5,-3),(3.0,3)]; fails=[f'round_to_int({x!r}) returned {s.round_to_int(x)!r}, expected {e!r}' for x,e in cases if s.round_to_int(x)!=e]; assert not fails, chr(10).join(fails)"'''
