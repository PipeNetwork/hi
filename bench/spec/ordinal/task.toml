schema_version = 2
allowed_changes = ["solution.py"]
name = "ordinal"
prompt = "Implement ordinal(n) in solution.py: return the English ordinal string for a positive integer n (e.g. ordinal(1) == '1st', ordinal(2) == '2nd', ordinal(4) == '4th'). The tests pin the tricky cases exactly. It currently raises NotImplementedError. Edit only solution.py."
[timeouts]
candidate_seconds = 900
visible_feedback_seconds = 120
oracle_seconds = 120

[final_oracle]
command = '''python3 -c "import solution as s; cases={1:'1st',2:'2nd',3:'3rd',4:'4th',5:'5th',11:'11th',12:'12th',13:'13th',21:'21st',22:'22nd',23:'23rd',101:'101st',111:'111th',113:'113th'}; fails=[f'ordinal({n}) returned {s.ordinal(n)!r}, expected {e!r}' for n,e in cases.items() if s.ordinal(n)!=e]; assert not fails, chr(10).join(fails)"'''
