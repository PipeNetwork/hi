schema_version = 2
allowed_changes = ["solution.py"]
name = "fizzbuzz"
prompt = "solution.py defines fizzbuzz(n): it should return 'FizzBuzz' for multiples of 15, 'Fizz' for multiples of 3, 'Buzz' for multiples of 5, and otherwise str(n). It currently never returns 'FizzBuzz'. Fix solution.py. Edit only solution.py."
[timeouts]
candidate_seconds = 900
visible_feedback_seconds = 120
oracle_seconds = 120

[final_oracle]
command = '''python3 -c "import solution as s; assert s.fizzbuzz(15)=='FizzBuzz' and s.fizzbuzz(30)=='FizzBuzz' and s.fizzbuzz(3)=='Fizz' and s.fizzbuzz(5)=='Buzz' and s.fizzbuzz(7)=='7'"'''
