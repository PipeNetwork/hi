schema_version = 2
allowed_changes = ["answer.txt"]
# Trivial demo task: the agent must put 42 into answer.txt.
# Real tasks ship a `fixture/` with a failing test and a `verify` that runs it.
name = "answer-42"
prompt = "Write the number 42 to a file named answer.txt in the current directory."
[timeouts]
candidate_seconds = 900
visible_feedback_seconds = 120
oracle_seconds = 120

[final_oracle]
command = "grep -qx 42 answer.txt"
