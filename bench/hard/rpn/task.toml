schema_version = 2
allowed_changes = ["solution.py"]
name = "rpn"
prompt = "Implement eval_rpn(tokens) in solution.py: evaluate a list of string tokens in Reverse Polish Notation and return the integer result. Each token is an integer string or one of the operators + - * / (use integer division for /, truncating toward negative infinity). Operands keep their order, so ['5','1','-'] is 5-1 == 4. For example eval_rpn(['3','4','+']) == 7. It currently raises NotImplementedError. Edit only solution.py."
[timeouts]
candidate_seconds = 900
visible_feedback_seconds = 120
oracle_seconds = 120

[final_oracle]
command = '''python3 -c "import solution as s; cases=[(['3','4','+'],7),(['5','1','-'],4),(['2','3','-'],-1),(['8','2','/'],4),(['6','2','/'],3),(['4','5','*','2','+'],22),(['10','2','3','*','-'],4)]; bad=[(t,e,s.eval_rpn(t)) for t,e in cases if s.eval_rpn(t)!=e]; assert not bad, bad"'''
