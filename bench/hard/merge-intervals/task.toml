name = "merge-intervals"
prompt = "Implement merge_intervals(intervals) in solution.py: given a list of [start, end] pairs (possibly unsorted), merge all overlapping or touching intervals and return them as a list of [start, end] pairs sorted by start. Touching intervals merge, so [1,3] and [3,5] become [1,5]. For example merge_intervals([[1,3],[2,6],[8,10]]) == [[1,6],[8,10]]. It currently raises NotImplementedError. Edit only solution.py."
verify = '''python3 -c "import solution as s; cases=[([[1,3],[2,6],[8,10],[15,18]],[[1,6],[8,10],[15,18]]),([[1,4],[4,5]],[[1,5]]),([],[]),([[5,6],[1,2]],[[1,2],[5,6]]),([[1,10],[2,3]],[[1,10]])]; bad=[(i,e) for i,e in cases if [list(x) for x in s.merge_intervals(i)]!=e]; assert not bad, bad"'''
