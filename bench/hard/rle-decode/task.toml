verify = '''python3 -c "import solution as s; cases=[('a3b1c2','aaabcc'),('x12','xxxxxxxxxxxx'),('',''),('q1','q'),('a10b2','aaaaaaaaaabb')]; bad=[(x,e,s.rle_decode(x)) for x,e in cases if s.rle_decode(x)!=e]; assert not bad, bad"'''
