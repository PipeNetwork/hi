verify = '''python3 -c "import solution as s; cases=[('',True),('()',True),('([])',True),('([)]',False),('(',False),(')(',False),('a(b)c',True),('{[()]}',True),('{[}',False),('(]',False)]; bad=[(x,e,s.is_balanced(x)) for x,e in cases if s.is_balanced(x)!=e]; assert not bad, bad"'''
